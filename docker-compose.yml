services:
  db:
    image: postgres:15-alpine
    container_name: smartqcm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartqcm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartqcm_pass}
      POSTGRES_DB: ${POSTGRES_DB:-smartqcm}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartqcm} -d ${POSTGRES_DB:-smartqcm}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartqcm-backend
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartqcm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartqcm_pass}
      POSTGRES_DB: ${POSTGRES_DB:-smartqcm}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-smartqcm}:${POSTGRES_PASSWORD:-smartqcm_pass}@db:5432/${POSTGRES_DB:-smartqcm}
      FLASK_DEBUG: "0"
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
    container_name: smartqcm-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  db-data:

networks:
  app-network:
    driver: bridge
